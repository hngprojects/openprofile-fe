name: Frontend CI/CD

on:
  push:
    branches: [feature/ci-cd, dev, staging, main]
  pull_request:
    branches: [feature/ci-cd, dev, staging, main]

jobs:
  ci:
    name: CI — Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

  deploy-dev:
    name: Deploy — Dev
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            cd /home/ubuntu/openprofile-fe
            git pull origin dev
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart openprofile-dev-fe || pm2 start pnpm --name "openprofile-dev-fe" -- start
            pm2 save

  deploy-staging:
    name: Deploy — Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            cd /home/ubuntu/openprofile-fe
            git pull origin staging
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart openprofile-staging-fe || pm2 start pnpm --name "openprofile-staging-fe" -- start
            pm2 save

  deploy-main:
    name: Deploy — main
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to main server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}
          script: |
            cd /home/ubuntu/openprofile-fe
            git pull origin main
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart openprofile-prod-fe || pm2 start pnpm --name "openprofile-prod-fe" -- start
            pm2 save

        